name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: npm ci
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m playwright install --with-deps chromium
      - run: npm run release:check
      - run: python scripts/test_math.py
      - run: node scripts/test_state_modules.mjs
      - run: npm run test:lifecycle
      - run: npm run test:animation
      - run: npm run test:recording
      - run: npm run test:exports
      - run: npm run test:image-exports
      - run: npm run test:visual-system
      - run: npm run test:curriculum
      - run: npm run smoke:mobile-v2

  windows-build:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: npm ci
      - run: python -m pip install -r requirements-dev.txt
      - run: npm run build:web
      - run: python scripts/test_math.py
      - run: node scripts/test_state_modules.mjs
      - run: npm run test:lifecycle
      - run: npm run test:animation
      - run: npm run test:recording
      - run: npm run test:exports
      - run: npm run test:image-exports
      - run: npm run test:visual-system
      - run: npm run test:curriculum
